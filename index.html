          // ============================================
          let luuTruMoDang = false;

          function batTatLuuTru() {
              luuTruMoDang = !luuTruMoDang;
              document.getElementById("luu-tru-noi-dung").style.display = luuTruMoDang ? "block" : "none";
              document.getElementById("luu-tru-toggle").textContent = luuTruMoDang ? "▾" : "▸";
              if (luuTruMoDang) veLuuTru();
          }

          function veLuuTru() {
              let wrap = document.getElementById("luu-tru-noi-dung");
              wrap.innerHTML = "";

              let dsLuuTru = danhSachData.filter(t => t.luuTru);

              // Cập nhật tiêu đề số lượng
              let soLT = dsLuuTru.length;
              document.getElementById("luu-tru-title").textContent = "📦 Lưu trữ" + (soLT > 0 ? " (" + soLT + ")" : "");

              if (dsLuuTru.length === 0) {
                  let trong = document.createElement("div");
                  trong.className = "luu-tru-trong";
                  trong.textContent = "Chưa có task nào được lưu trữ";
                  wrap.appendChild(trong);
                  return;
              }

              // Nhóm theo ngày lưu trữ
              let nhom = {};
              dsLuuTru.forEach(function(task) {
                  let ngay = task.ngayLuuTru || "Không rõ ngày";
                  if (!nhom[ngay]) nhom[ngay] = [];
                  nhom[ngay].push(task);
              });

              Object.keys(nhom).sort().reverse().forEach(function(ngay) {
                  let nhomDiv = document.createElement("div");
                  nhomDiv.className = "luu-tru-nhom";

                  let tieuDeNgay = document.createElement("div");
                  tieuDeNgay.className = "luu-tru-ngay";
                  // Format ngày
                  if (ngay !== "Không rõ ngày") {
                      let [nam, thang, ng] = ngay.split("-");
                      tieuDeNgay.textContent = ng + "/" + thang + "/" + nam;
                  } else {
                      tieuDeNgay.textContent = ngay;
                  }
                  nhomDiv.appendChild(tieuDeNgay);

                  nhom[ngay].forEach(function(task) {
                      let item = document.createElement("div");
                      item.className = "luu-tru-item";

                      let ten = document.createElement("span");
                      ten.className = "luu-tru-ten";
                      ten.textContent = task.tenCongViec;

                      item.appendChild(ten);

                      if (task.danhSach) {
                          let ds = document.createElement("span");
                          ds.className = "luu-tru-ds";
                          ds.textContent = task.danhSach;
                          item.appendChild(ds);
                      }

                      let btnKhoiPhuc = document.createElement("button");
                      btnKhoiPhuc.className = "btn-khoi-phuc";
                      btnKhoiPhuc.textContent = "Khôi phục";
                      btnKhoiPhuc.onclick = function() {
                          let idx = danhSachData.findIndex(t => t.id === task.id);
                          if (idx !== -1) {
                              delete danhSachData[idx].luuTru;
                              delete danhSachData[idx].ngayLuuTru;
                          }
                          luuDuLieu();
                          veGiaoDien();
                          veLuuTru();
                      };

                      let btnXoaHan = document.createElement("button");
                      btnXoaHan.className = "btn-khoi-phuc";
                      btnXoaHan.style.color = "var(--text-muted)";
                      btnXoaHan.textContent = "✕";
                      btnXoaHan.title = "Xóa vĩnh viễn";
                      btnXoaHan.onclick = function() {
                          hienModal('Xóa vĩnh viễn "' + task.tenCongViec + '"?', "Xóa", function() {
                              let idx = danhSachData.findIndex(t => t.id === task.id);
                              if (idx !== -1) danhSachData.splice(idx, 1);
                              luuDuLieu();
                              veLuuTru();
                          });
                      };

                      item.appendChild(btnKhoiPhuc);
                      item.appendChild(btnXoaHan);
                      nhomDiv.appendChild(item);
                  });

                  wrap.appendChild(nhomDiv);
              });
          }

          // ============================================
          // KHỞI TẠO UI + EXPOSE LÊN WINDOW CHO FIREBASE
          // ============================================
          function _init() {
              // Wrap veGiaoDien để auto-sync window vars trước khi vẽ
              let _origVGD = veGiaoDien;
              veGiaoDien = function() {
                  if (window.danhSachData !== danhSachData) danhSachData = window.danhSachData;
                  if (window.danhMucList  !== danhMucList)  danhMucList  = window.danhMucList;
                  _origVGD();
              };

              let _origVTL = veThanhLoc;
              veThanhLoc = function() {
                  if (window.danhMucList !== danhMucList) danhMucList = window.danhMucList;
                  _origVTL();
              };

              // Expose lên window để Firebase module script gọi được
              window.veGiaoDien           = veGiaoDien;
              window.veThanhLoc           = veThanhLoc;
              window.capNhatSelectDanhMuc = capNhatSelectDanhMuc;

              // Khởi tạo UI lần đầu
              veGiaoDien();
              veThanhLoc();
              capNhatSelectDanhMuc();
          }
          _init();

          // ============================================
          // HÀM TIỆN ÍCH
          // ============================================
          function layNgayHomNay() {
              return new Date().toISOString().split("T")[0];
          }

          function dinhDangNgay(chuoiNgay) {
              let [nam, thang, ngay] = chuoiNgay.split("-");
              return ngay + "/" + thang;
          }

          function dinhDangGio(chuoiDatetime) {
              let [ngay, gio] = chuoiDatetime.split("T");
              let [h, m] = gio.split(":");
              return h + ":" + m;
          }

          function luuDuLieu() {
              localStorage.setItem("todos", JSON.stringify(danhSachData));
              window.danhSachData = danhSachData;
              if (typeof window.syncToCloud === "function") window.syncToCloud();
          }

          function nhimEnter(event) {
              if (event.key === "Enter") themCongViec();
          }

          function toDateKeyFromDeadline(deadline) {
              if (!deadline) return null;
              return String(deadline).split("T")[0] || null;
          }

          function toTomorrowKey(dateKey) {
              const base = dateKey || layNgayHomNay();
              const d = new Date(base + "T00:00:00");
              d.setDate(d.getDate() + 1);
              return d.toISOString().split("T")[0];
          }

          function copyHomNaySangNgayMai() {
              const today = layNgayHomNay();
              const tomorrow = toTomorrowKey(today);

              const todays = danhSachData.filter(t => !t.luuTru && toDateKeyFromDeadline(t.deadline) === today);
              if (!todays.length) {
                  hienModal("Không có task nào của hôm nay để copy.", "OK", null, true);
                  return;
              }

              const existingTomorrow = danhSachData.filter(t => !t.luuTru && toDateKeyFromDeadline(t.deadline) === tomorrow);
              const norm = (s) => String(s || "").trim().toLowerCase();
              const existingKey = new Set(existingTomorrow.map(t => norm(t.tenCongViec) + "|" + norm(t.danhSach || "")));

              let added = 0;

              todays.forEach(t => {
                  const key = norm(t.tenCongViec) + "|" + norm(t.danhSach || "");
                  if (existingKey.has(key)) return;
                  existingKey.add(key);

                  let newDeadline = null;
                  if (t.deadline) {
                      const parts = String(t.deadline).split("T");
                      const time = parts[1] || "09:00";
                      newDeadline = tomorrow + "T" + time;
                  } else {
                      newDeadline = tomorrow + "T09:00";
                  }

                  danhSachData.push({
                      id:         Date.now() + "_" + Math.random().toString(36).slice(2),
                      tenCongViec: t.tenCongViec,
                      hoànThành:  false,
                      deadline:   newDeadline,
                      danhSach:   t.danhSach || null,
                      laMoi:      true
                  });
                  added++;
              });

              if (!added) {
                  hienModal("Ngày mai đã có sẵn các task tương tự. Không có gì để copy thêm.", "OK", null, true);
                  return;
              }

              luuDuLieu();
              veGiaoDien();
              hienModal("Đã copy " + added + " task từ hôm nay sang ngày mai.", "OK", null, true);
          }

          function themCongViec() {
              let input         = document.getElementById("input-cong-viec");
              let inputDeadline = document.getElementById("input-deadline");
              let inputDanhSach = document.getElementById("input-danh-sach");
              let congViec      = input.value.trim();

              if (congViec === "") {
                  alert("Bạn chưa nhập công việc!");
                  return;
              }

               danhSachData.push({
                  id:         Date.now() + "_" + Math.random().toString(36).slice(2),
                  tenCongViec: congViec,
                  hoànThành:  false,
                  deadline:   inputDeadline.value || null,
                  danhSach:   inputDanhSach.value || null,
                  laMoi:      true
              });

              luuDuLieu();
              veGiaoDien();

              input.value         = "";
              inputDeadline.value = "";
              inputDanhSach.value = "";
              input.focus();
          }

      </script>

  </body>
  </html>
