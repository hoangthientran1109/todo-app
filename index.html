<!DOCTYPE html>
  <html lang="vi">                                                                                                        <head>
      <meta charset="UTF-8">                                                                                                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
  rel="stylesheet">
      <title>To-do List</title>

      <!-- Firebase SDK -->
      <script type="module">
          import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
          import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

          // =====================================================
          // ĐỔI config này thành config Firebase project của mày
          // =====================================================
          const firebaseConfig = {
  apiKey: "AIzaSyBRhwGwOl1W5O_y8OCvKtnLZsp2oleOKqI",
  authDomain: "my-todo-app-ecf5e.firebaseapp.com",
  databaseURL: "https://my-todo-app-ecf5e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-todo-app-ecf5e",
  storageBucket: "my-todo-app-ecf5e.firebasestorage.app",
  messagingSenderId: "198555152410",
  appId: "1:198555152410:web:2b8c09548e10d8a4b661a3"
};

          const app = initializeApp(firebaseConfig);
          const db  = getDatabase(app);

          // Expose để code non-module dùng
          window._fbRef = ref;
          window._fbSet = set;
          window._fbDB  = db;

          // Lắng nghe thay đổi từ cloud → cập nhật local + UI
          onValue(ref(db, "todos"), (snap) => {
              let data = snap.val();
              if (data && Array.isArray(data.tasks)) {
                  window.danhSachData = data.tasks;
                  localStorage.setItem("todos", JSON.stringify(data.tasks));
              }
              // Luôn re-render sau khi Firebase trả về
              if (typeof window.veGiaoDien === "function") window.veGiaoDien();
          });

          onValue(ref(db, "categories"), (snap) => {
              let data = snap.val();
              if (data && Array.isArray(data.list) && data.list.length > 0) {
                  window.danhMucList = data.list;
                  localStorage.setItem("categories", JSON.stringify(data.list));
              }
              // Luôn re-render thanh lọc + select sau khi Firebase trả về
              // (dù data giống hay khác — đảm bảo UI đúng trên mọi thiết bị)
              if (typeof window.veThanhLoc === "function") window.veThanhLoc();
              if (typeof window.capNhatSelectDanhMuc === "function") window.capNhatSelectDanhMuc();
          });

          // Expose hàm push lên Firebase
          window.syncToCloud = function() {
              try {
                  set(ref(db, "todos"),      { tasks: window.danhSachData });
                  set(ref(db, "categories"), { list:  window.danhMucList  });
                  let el = document.getElementById("sync-status");
                  if (el) { el.textContent = "☁ synced"; el.style.color = "var(--text-muted)"; }
              } catch(e) {
                  console.warn("Firebase sync failed:", e);
                  let el = document.getElementById("sync-status");
                  if (el) { el.textContent = "⚠ offline"; el.style.color = "#e74c3c"; }
              }
          };

          // Hiển thị trạng thái kết nối Firebase
          onValue(ref(db, ".info/connected"), (snap) => {
              let el = document.getElementById("sync-status");
              if (!el) return;
              if (snap.val() === true) {
                  el.textContent = "☁ online";
                  el.style.color = "var(--text-muted)";
              } else {
                  el.textContent = "⚠ offline";
                  el.style.color = "#e74c3c";
              }
          });
      </script>

      <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }

          :root {
              --bg-page:      #f5f0e8;
              --bg-card:      #fffdf7;
              --bg-item:      #faf7f0;
              --border:       #e8e0d0;
              --border-input: #d4c9b5;
              --text-main:    #3d2b1f;
              --text-sub:     #8b7355;
              --text-muted:   #b8a898;
              --btn-primary:  #8b6f47;
              --btn-hover:    #6b5237;
              --shadow:       0 4px 16px rgba(139,111,71,0.12);
          }

          body.dark {
              --bg-page:      #1c1814;
              --bg-card:      #252018;
              --bg-item:      #2e2820;
              --border:       #3d3428;
              --border-input: #4a3f30;
              --text-main:    #f0e6d3;
              --text-sub:     #a89070;
              --text-muted:   #6b5a48;
              --btn-primary:  #c4956a;
              --btn-hover:    #d4a87a;
              --shadow:       0 4px 16px rgba(0,0,0,0.4);
          }

          body {
              font-family: 'Lora', Georgia, serif;
              background-color: var(--bg-page);
              display: flex;
              justify-content: center;
              padding: 40px 20px;
              min-height: 100vh;
              transition: background-color 0.3s;
          }

          .container {
              background-color: var(--bg-card);
              padding: 30px;
              border-radius: 12px;
              width: 100%;
              max-width: 500px;
              box-shadow: var(--shadow);
              transition: background-color 0.3s;
          }

          .header {
              display: flex;
              align-items: center;
              justify-content: center;
              position: relative;
              margin-bottom: 20px;
          }

          h1 {
              color: var(--text-main);
              font-size: 22px;
              letter-spacing: 1px;
          }

          .btn-dark-mode {
              position: absolute;
              right: 0;
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 8px;
              padding: 4px 10px;
              cursor: pointer;
              font-size: 18px;
              color: var(--text-main);
              transition: all 0.2s;
          }

          .btn-dark-mode:hover {
              background-color: var(--btn-primary);
              color: var(--bg-card);
          }

          /* Tabs */
          .tabs {
              display: flex;
              margin-bottom: 20px;
              border-bottom: 2px solid var(--border);
          }

          .tab {
              padding: 8px 20px;
              cursor: pointer;
              font-size: 15px;
              color: var(--text-sub);
              border-bottom: 2px solid transparent;
              margin-bottom: -2px;
              transition: all 0.15s;
              font-family: 'Lora', Georgia, serif;
          }

          .tab:hover { color: var(--text-main); }

          .tab.active {
              color: var(--text-main);
              border-bottom: 2px solid var(--btn-primary);
              font-weight: 600;
          }

          .man-hinh { display: none; }
          .man-hinh.active { display: block; }

          /* Form */
          .input-block {
              display: flex;
              flex-direction: column;
              gap: 8px;
              margin-bottom: 8px;
          }

          .input-row {
              display: flex;
              gap: 8px;
          }

          input[type="text"],
          input[type="datetime-local"],
          select {
              padding: 10px;
              border: 2px solid var(--border-input);
              border-radius: 8px;
              font-size: 16px;
              color: var(--text-main);
              background-color: var(--bg-card);
              transition: border-color 0.2s, background-color 0.3s, color 0.3s;
              width: 100%;
              color-scheme: light;
              font-family: 'Lora', Georgia, serif;
              -webkit-appearance: auto;
              appearance: auto;
          }

          body.dark input[type="datetime-local"] { color-scheme: dark; }

          input[type="text"] { flex: 1; }

          input[type="text"]:focus,
          input[type="datetime-local"]:focus,
          select:focus {
              outline: none;
              border-color: var(--btn-primary);
          }

          select { cursor: pointer; }

          button.btn-them {
              padding: 10px 16px;
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border: none;
              border-radius: 8px;
              font-size: 15px;
              cursor: pointer;
              white-space: nowrap;
              transition: background-color 0.2s;
              font-family: 'Lora', Georgia, serif;
          }

          button.btn-them:hover { background-color: var(--btn-hover); }

          /* Tìm kiếm */
          .o-tim-kiem {
              position: relative;
              margin-bottom: 8px;
          }

          .o-tim-kiem input {
              width: 100%;
              padding: 9px 12px 9px 34px;
              border: 2px solid var(--border-input);
              border-radius: 8px;
              font-size: 15px;
              color: var(--text-main);
              background-color: var(--bg-card);
              font-family: 'Lora', Georgia, serif;
          }

          .o-tim-kiem input:focus {
              outline: none;
              border-color: var(--btn-primary);
          }

          .icon-tim-kiem {
              position: absolute;
              left: 10px;
              top: 50%;
              transform: translateY(-50%);
              color: var(--text-sub);
              font-size: 16px;
              pointer-events: none;
          }

          mark.highlight {
              background-color: #f0d080;
              border-radius: 3px;
              color: #3d2b1f;
          }

          body.dark mark.highlight {
              background-color: #b8860b;
              color: #fff;
          }

          /* Thanh lọc */
          .bo-loc {
              display: flex;
              gap: 6px;
              flex-wrap: nowrap;
              overflow-x: auto;
              margin: 6px 0 4px;
              padding-bottom: 2px;
              -webkit-overflow-scrolling: touch;
              scrollbar-width: none;
          }

          .bo-loc::-webkit-scrollbar { display: none; }

          .btn-loc {
              padding: 4px 12px;
              border: 1px solid var(--border-input);
              border-radius: 20px;
              background: transparent;
              font-size: 13px;
              cursor: pointer;
              color: var(--text-sub);
              transition: all 0.15s;
              font-family: 'Lora', Georgia, serif;
          }

          .btn-loc:hover {
              border-color: var(--btn-primary);
              color: var(--btn-primary);
          }

          .btn-loc.active {
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border-color: var(--btn-primary);
          }

          /* Toolbar */
          .toolbar {
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin: 8px 0 4px;
              gap: 8px;
          }

          .btn-toolbar {
              padding: 4px 12px;
              border: 1px solid var(--border-input);
              border-radius: 8px;
              background: transparent;
              font-size: 13px;
              cursor: pointer;
              color: var(--text-sub);
              transition: all 0.15s;
              white-space: nowrap;
              font-family: 'Lora', Georgia, serif;
          }

          .btn-toolbar:hover {
              border-color: var(--text-main);
              color: var(--text-main);
          }

          .btn-toolbar.nguy-hiem:hover {
              background-color: #e74c3c;
              border-color: #e74c3c;
              color: white;
          }

          select.chon-sap-xep {
              padding: 4px 10px;
              border: 1px solid var(--border-input);
              border-radius: 8px;
              background: transparent;
              font-size: 13px;
              cursor: pointer;
              color: var(--text-sub);
              width: auto;
              font-family: 'Lora', Georgia, serif;
          }

          select.chon-sap-xep:focus { outline: none; }

          /* Progress bar */
          .progress-wrap { margin: 10px 0 4px; }

          .progress-top {
              display: flex;
              justify-content: space-between;
              font-size: 12px;
              color: var(--text-sub);
              margin-bottom: 5px;
          }

          .progress-bar-bg {
              width: 100%;
              height: 6px;
              background-color: var(--border);
              border-radius: 10px;
              overflow: hidden;
          }

          .progress-bar-fill {
              height: 100%;
              background-color: var(--btn-primary);
              border-radius: 10px;
              transition: width 0.4s ease;
          }

          .progress-bar-fill.full { background-color: #7ba05b; }

          /* Nhóm ngày */
          .nhom-ngay { margin-top: 20px; }

          .tieu-de-ngay {
              font-size: 12px;
              font-weight: 600;
              color: var(--text-sub);
              text-transform: uppercase;
              letter-spacing: 1px;
              border-bottom: 1px solid var(--border);
              padding-bottom: 4px;
              margin-bottom: 8px;
          }

          .tieu-de-ngay.hom-nay { color: var(--btn-primary); }
          .tieu-de-ngay.qua-han { color: #c0392b; }

          ul { list-style: none; }

          /* Animation */
          @keyframes slideIn {
              from { opacity: 0; transform: translateY(-8px); }
              to   { opacity: 1; transform: translateY(0); }
          }

          @keyframes slideOut {
              from { opacity: 1; transform: translateY(0); }
              to   { opacity: 0; transform: translateX(40px); }
          }

          li.them-moi { animation: slideIn 0.25s ease; }
          li.dang-xoa { animation: slideOut 0.2s ease forwards; }

          li {
              display: flex;
              justify-content: space-between;
              align-items: flex-start;
              padding: 10px 12px;
              background-color: var(--bg-item);
              border: 1px solid var(--border);
              border-radius: 8px;
              margin-top: 6px;
              font-size: 15px;
              gap: 8px;
              transition: background-color 0.3s;
              cursor: grab;
          }

          li:active { cursor: grabbing; }

          li.qua-han {
              border-left: 3px solid #e74c3c;
              background-color: rgba(231,76,60,0.06);
          }

          li.dang-keo {
              opacity: 0.4;
              border: 2px dashed var(--border-input);
          }

          li.vi-tri-tha { border-top: 3px solid var(--btn-primary); }

          .noi-dung-task {
              flex: 1;
              display: flex;
              flex-direction: column;
              gap: 3px;
              cursor: pointer;
          }

          .ten-cong-viec {
              font-size: 15px;
              color: var(--text-main);
          }

          .ten-cong-viec:hover { opacity: 0.7; }

          .gio-deadline {
              font-size: 12px;
              color: var(--text-sub);
          }

          .gio-deadline.qua-han {
              color: #e74c3c;
              font-weight: bold;
          }

          /* Đếm ngược */
          .dem-nguoc {
              font-size: 11px;
              padding: 1px 7px;
              border-radius: 20px;
              font-style: italic;
              display: inline-block;
              margin-top: 1px;
          }

          .dem-nguoc.gap {
              background-color: rgba(231,76,60,0.12);
              color: #e74c3c;
              font-weight: bold;
          }

          .dem-nguoc.hom-nay {
              background-color: rgba(139,111,71,0.12);
              color: var(--btn-primary);
          }

          .dem-nguoc.binh-thuong {
              background-color: var(--border);
              color: var(--text-sub);
          }

          .badge-ds {
              display: inline-block;
              font-size: 11px;
              padding: 2px 8px;
              border-radius: 20px;
              background-color: var(--border);
              color: var(--text-sub);
              font-weight: 600;
          }

          .input-sua {
              width: 100%;
              padding: 6px 8px;
              border: 2px solid var(--btn-primary);
              border-radius: 6px;
              font-size: 14px;
              background-color: var(--bg-card);
              color: var(--text-main);
              font-family: 'Lora', Georgia, serif;
          }

          .input-sua:focus { outline: none; }

          .nhom-nut {
              display: flex;
              gap: 6px;
              align-items: center;
              flex-shrink: 0;
          }

          li button {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 6px;
              font-size: 15px;
              cursor: pointer;
              padding: 2px 7px;
              color: var(--text-main);
              line-height: 1.4;
              transition: all 0.15s;
          }

          li button:hover {
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border-color: var(--btn-primary);
          }

          .hoan-thanh .ten-cong-viec {
              text-decoration: line-through;
              color: var(--text-muted);
          }

          .hoan-thanh .gio-deadline { color: var(--text-muted); }
          .hoan-thanh .badge-ds { opacity: 0.4; }

          /* Empty state */
          .empty-state {
              text-align: center;
              padding: 40px 20px;
          }

          .empty-state .empty-icon {
              font-size: 48px;
              margin-bottom: 12px;
              opacity: 0.6;
          }

          .empty-state .empty-title {
              font-size: 16px;
              color: var(--text-main);
              margin-bottom: 6px;
          }

          .empty-state .empty-sub {
              font-size: 13px;
              color: var(--text-sub);
              font-style: italic;
          }

          /* Lịch */
          .lich-header {
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 8px;
          }

          .lich-header span {
              font-weight: 600;
              font-size: 16px;
              color: var(--text-main);
          }

          .btn-thang {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 6px;
              padding: 4px 10px;
              cursor: pointer;
              font-size: 16px;
              color: var(--text-main);
              transition: all 0.15s;
          }

          .btn-thang:hover {
              background-color: var(--btn-primary);
              color: var(--bg-card);
          }

          .lich-hom-nay-wrap {
              text-align: center;
              margin-bottom: 10px;
          }

          .lich-grid {
              display: grid;
              grid-template-columns: repeat(7, 1fr);
              gap: 4px;
          }

          .lich-thu {
              text-align: center;
              font-size: 12px;
              font-weight: 600;
              color: var(--text-sub);
              padding: 4px 0;
          }

          .lich-o {
              aspect-ratio: 1;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              border-radius: 8px;
              cursor: pointer;
              transition: background-color 0.15s;
              gap: 3px;
          }

          .lich-o:hover { background-color: var(--bg-item); }
          .lich-o.hom-nay { background-color: var(--btn-primary); }
          .lich-o.hom-nay .lich-so { color: var(--bg-card); }

          .lich-o.dang-chon {
              background-color: var(--bg-item);
              border: 2px solid var(--btn-primary);
          }

          .lich-o.hom-nay.dang-chon {
              background-color: var(--bg-item);
              border: 2px solid var(--btn-primary);
          }

          .lich-o.hom-nay.dang-chon .lich-so { color: var(--text-main); }
          .lich-o.hom-nay.dang-chon .cham { background-color: var(--text-sub); }
          .lich-o.thang-khac { opacity: 0.3; pointer-events: none; }

          .lich-so {
              font-size: 14px;
              color: var(--text-main);
              line-height: 1;
          }

          .lich-cham { display: flex; gap: 2px; }

          .cham {
              width: 5px;
              height: 5px;
              border-radius: 50%;
              background-color: var(--text-sub);
          }

          .lich-o.hom-nay .cham { background-color: var(--bg-card); opacity: 0.7; }

          .lich-panel {
              margin-top: 16px;
              border-top: 1px solid var(--border);
              padding-top: 14px;
          }

          .lich-panel-tieu-de {
              font-size: 13px;
              font-weight: 600;
              color: var(--text-sub);
              text-transform: uppercase;
              letter-spacing: 1px;
              margin-bottom: 8px;
          }

          .lich-task-item {
              display: flex;
              align-items: center;
              gap: 10px;
              padding: 8px 12px;
              background-color: var(--bg-item);
              border: 1px solid var(--border);
              border-radius: 8px;
              margin-top: 6px;
              cursor: pointer;
              transition: opacity 0.15s;
          }

          .lich-task-item:hover { opacity: 0.8; }

          .lich-task-ten {
              flex: 1;
              font-size: 14px;
              color: var(--text-main);
          }

          .lich-task-gio {
              font-size: 12px;
              color: var(--text-sub);
          }

          .lich-task-ds {
              font-size: 11px;
              padding: 2px 8px;
              border-radius: 20px;
              background-color: var(--border);
              color: var(--text-sub);
          }

          .lich-task-xoa {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 6px;
              font-size: 13px;
              padding: 2px 7px;
              cursor: pointer;
              color: var(--text-muted);
              flex-shrink: 0;
              transition: all 0.15s;
              line-height: 1.4;
          }

          .lich-task-xoa:hover {
              background-color: #e74c3c;
              border-color: #e74c3c;
              color: white;
          }

          .lich-task-item.da-xong .lich-task-ten {
              text-decoration: line-through;
              color: var(--text-muted);
          }

          .lich-trong {
              text-align: center;
              color: var(--text-sub);
              font-size: 14px;
              font-style: italic;
              padding: 20px 0;
          }

          /* Nút lưu trữ dưới danh sách */
          .luu-tru-footer {
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-top: 16px;
              padding-top: 12px;
              border-top: 1px solid var(--border);
          }

          .luu-tru-footer-gio {
              font-size: 12px;
              color: var(--text-muted);
              font-style: italic;
          }

          .btn-luu-tru {
              padding: 5px 14px;
              border: 1px solid var(--border-input);
              border-radius: 8px;
              background: transparent;
              font-size: 13px;
              cursor: pointer;
              color: var(--text-sub);
              transition: all 0.15s;
              font-family: 'Lora', Georgia, serif;
          }

          .btn-luu-tru:hover {
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border-color: var(--btn-primary);
          }

          /* Lưu trữ */
          .luu-tru-wrap {
              margin-top: 20px;
              border-top: 1px solid var(--border);
              padding-top: 12px;
          }

          .luu-tru-header {
              display: flex;
              justify-content: space-between;
              align-items: center;
              cursor: pointer;
              padding: 6px 0;
              font-size: 14px;
              font-weight: 600;
              color: var(--text-sub);
              user-select: none;
          }

          .luu-tru-header:hover { color: var(--text-main); }

          .luu-tru-nhom {
              margin-top: 10px;
          }

          .luu-tru-ngay {
              font-size: 11px;
              font-weight: 600;
              color: var(--text-muted);
              text-transform: uppercase;
              letter-spacing: 1px;
              margin: 10px 0 4px;
          }

          .luu-tru-item {
              display: flex;
              align-items: center;
              gap: 8px;
              padding: 8px 12px;
              background-color: var(--bg-item);
              border: 1px solid var(--border);
              border-radius: 8px;
              margin-top: 4px;
              opacity: 0.75;
          }

          .luu-tru-ten {
              flex: 1;
              font-size: 14px;
              color: var(--text-sub);
              text-decoration: line-through;
          }

          .luu-tru-ds {
              font-size: 11px;
              padding: 2px 7px;
              border-radius: 20px;
              background-color: var(--border);
              color: var(--text-muted);
          }

          .btn-khoi-phuc {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 6px;
              font-size: 12px;
              padding: 2px 8px;
              cursor: pointer;
              color: var(--text-sub);
              white-space: nowrap;
              font-family: 'Lora', Georgia, serif;
              transition: all 0.15s;
          }

          .btn-khoi-phuc:hover {
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border-color: var(--btn-primary);
          }

          .luu-tru-trong {
              font-size: 13px;
              color: var(--text-muted);
              font-style: italic;
              padding: 10px 0;
          }

          /* Mobile */
          @media (max-width: 480px) {
              body { padding: 0; align-items: flex-start; }

              .container {
                  border-radius: 0;
                  padding: 16px;
                  min-height: 100vh;
                  box-shadow: none;
              }

              h1 { font-size: 18px; }

              .input-row.hang-2 { flex-direction: column; }

              .toolbar { flex-direction: column; align-items: stretch; }
              .toolbar > div { display: flex; gap: 6px; }
              .toolbar > div button { flex: 1; }
              select.chon-sap-xep { width: 100%; }

              .bo-loc {
                  flex-wrap: nowrap;
                  overflow-x: auto;
                  padding-bottom: 4px;
                  -webkit-overflow-scrolling: touch;
              }

              .btn-loc { white-space: nowrap; }
              li { font-size: 14px; padding: 8px 10px; }
              .tab { padding: 10px 16px; }
              .lich-so { font-size: 12px; }
              .cham { width: 4px; height: 4px; }
          }
          /* Nút quản lý danh mục */
          .btn-quan-ly-dm {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 8px;
              padding: 3px 8px;
              font-size: 14px;
              cursor: pointer;
              color: var(--text-sub);
              transition: all 0.15s;
              flex-shrink: 0;
          }

          .btn-quan-ly-dm:hover {
              border-color: var(--btn-primary);
              color: var(--btn-primary);
          }

          /* Panel quản lý danh mục */
          .panel-dm-noi-dung {
              background: var(--bg-item);
              border: 1px solid var(--border);
              border-radius: 10px;
              padding: 14px;
              margin-bottom: 8px;
              animation: slideIn 0.2s ease;
          }

          .panel-dm-tieu-de {
              font-size: 12px;
              font-weight: 600;
              color: var(--text-sub);
              text-transform: uppercase;
              letter-spacing: 1px;
              margin-bottom: 10px;
          }

          .panel-dm-item {
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 5px 0;
              border-bottom: 1px solid var(--border);
          }

          .panel-dm-item:last-child { border-bottom: none; }

          .panel-dm-ten {
              font-size: 14px;
              color: var(--text-main);
          }

          .panel-dm-item button {
              background: none;
              border: 1px solid var(--border-input);
              border-radius: 5px;
              font-size: 12px;
              padding: 2px 7px;
              cursor: pointer;
              color: var(--text-muted);
              transition: all 0.15s;
          }

          .panel-dm-item button:hover {
              background: #e74c3c;
              border-color: #e74c3c;
              color: white;
          }

          .panel-dm-them {
              display: flex;
              gap: 8px;
              margin-top: 10px;
          }

          .panel-dm-them input {
              flex: 1;
              padding: 7px 10px;
              border: 2px solid var(--border-input);
              border-radius: 8px;
              font-size: 14px;
              color: var(--text-main);
              background: var(--bg-card);
              font-family: 'Lora', Georgia, serif;
          }

          .panel-dm-them input:focus {
              outline: none;
              border-color: var(--btn-primary);
          }

          /* Modal xác nhận */
          .modal-overlay {
              position: fixed;
              inset: 0;
              background: rgba(0,0,0,0.35);
              display: flex;
              align-items: center;
              justify-content: center;
              z-index: 999;
              animation: fadeIn 0.15s ease;
          }

          @keyframes fadeIn {
              from { opacity: 0; }
              to   { opacity: 1; }
          }

          .modal-box {
              background: var(--bg-card);
              border: 1px solid var(--border);
              border-radius: 12px;
              padding: 24px 24px 18px;
              max-width: 340px;
              width: 90%;
              box-shadow: 0 8px 32px rgba(0,0,0,0.18);
              animation: slideUp 0.15s ease;
          }

          @keyframes slideUp {
              from { opacity: 0; transform: translateY(12px); }
              to   { opacity: 1; transform: translateY(0); }
          }

          .modal-msg {
              font-size: 15px;
              color: var(--text-main);
              margin-bottom: 18px;
              line-height: 1.5;
          }

          .modal-nut {
              display: flex;
              gap: 8px;
              justify-content: flex-end;
          }

          .btn-modal-ok {
              padding: 6px 18px;
              background-color: var(--btn-primary);
              color: var(--bg-card);
              border: none;
              border-radius: 8px;
              font-size: 14px;
              cursor: pointer;
              font-family: 'Lora', Georgia, serif;
              transition: background-color 0.2s;
          }

          .btn-modal-ok:hover { background-color: var(--btn-hover); }

      </style>
  </head>
  <body>

      <div class="container">
          <div class="header">
              <h1>To-do List</h1>
              <span id="sync-status" title="Trạng thái đồng bộ" style="position:absolute;left:0;font-size:11px;color:var(--text-muted);letter-spacing:0;">⏳ sync...</span>
              <button class="btn-dark-mode" onclick="batTatDarkMode()" id="btn-dark">🌙</button>
          </div>

          <div class="tabs">
              <div class="tab active" onclick="chuyenTab('danh-sach-tab', this)">Danh sách</div>
              <div class="tab" onclick="chuyenTab('lich-tab', this)">Lịch</div>
          </div>

          <!-- Màn hình Danh sách -->
          <div id="danh-sach-tab" class="man-hinh active">

              <div class="input-block">
                  <div class="input-row">
                      <input type="text" id="input-cong-viec" placeholder="Nhập công việc..."
  onkeydown="nhimEnter(event)">
                      <button class="btn-them" onclick="themCongViec()">Thêm</button>
                  </div>
                  <div class="input-row hang-2">
                      <input type="datetime-local" id="input-deadline">
                      <select id="input-danh-sach">
                          <option value="">— Danh sách —</option>
                      </select>
                  </div>
              </div>

              <div class="o-tim-kiem">
                  <span class="icon-tim-kiem">⌕</span>
                  <input type="text" id="input-tim-kiem" placeholder="Tìm kiếm task..." oninput="timKiem()">
              </div>

              <div style="display:flex; align-items:center; gap:8px; margin: 6px 0 4px;">
                  <div class="bo-loc" id="bo-loc"></div>
                  <button class="btn-quan-ly-dm" onclick="batTatPanelDanhMuc()" title="Quản lý danh sách">⚙</button>
              </div>

              <!-- Panel quản lý danh sách -->
              <div id="panel-danh-muc" style="display:none">
                  <div class="panel-dm-noi-dung">
                      <div class="panel-dm-tieu-de">Quản lý danh sách</div>
                      <div id="panel-dm-ds"></div>
                      <div class="panel-dm-them">
                          <input type="text" id="input-ten-dm" placeholder="Tên danh sách mới..." maxlength="20" onkeydown="if(event.key==='Enter') themDanhMuc()">
                          <button class="btn-them" onclick="themDanhMuc()">Thêm</button>
                      </div>
                  </div>
              </div>

              <div class="toolbar">
                  <div style="display:flex; gap:6px; flex-wrap:wrap;">
                      <button class="btn-toolbar" onclick="copyHomNaySangNgayMai()">⧉ Copy → Ngày mai</button>
                      <button class="btn-toolbar nguy-hiem" onclick="xoaTatCaHoanThanh()">✕ Xóa đã hoàn thành</button>
                      <button class="btn-toolbar nguy-hiem" onclick="xoaTatCa()">✕ Xóa tất cả</button>
                  </div>
                  <select class="chon-sap-xep" id="chon-sap-xep" onchange="veGiaoDien()">
                      <option value="mac-dinh">Sắp xếp: Mặc định</option>
                      <option value="deadline">Deadline gần nhất</option>
                      <option value="ten-az">Tên A → Z</option>
                      <option value="ten-za">Tên Z → A</option>
                  </select>
              </div>

              <div class="progress-wrap" id="progress-wrap" style="display:none">
                  <div class="progress-top">
                      <span id="dem"></span>
                      <span id="dem-phan-tram"></span>
                  </div>
                  <div class="progress-bar-bg">
                      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
                  </div>
              </div>

              <div id="danh-sach"></div>

              <div class="luu-tru-footer" id="luu-tru-footer">
                  <span id="luu-tru-footer-gio" class="luu-tru-footer-gio"></span>
                  <button class="btn-luu-tru" onclick="luuTruTatCa()">Lưu trữ</button>
              </div>


          </div>
          <!-- Màn hình Lịch -->
          <div id="lich-tab" class="man-hinh">
              <div class="lich-header">
                  <button class="btn-thang" onclick="doiThang(-1)">‹</button>
                  <span id="tieu-de-thang"></span>
                  <button class="btn-thang" onclick="doiThang(1)">›</button>
              </div>
              <div class="lich-hom-nay-wrap">
                  <button class="btn-toolbar" onclick="veHomNay()">Hôm nay</button>
              </div>
              <div class="lich-grid" id="lich-grid"></div>
              <div class="lich-panel" id="lich-panel"></div>
          </div>

      </div>

      <!-- Modal xác nhận dùng chung -->
      <div id="modal-xac-nhan" class="modal-overlay" style="display:none">
          <div class="modal-box">
              <div class="modal-msg" id="modal-msg"></div>
              <div class="modal-nut">
                  <button class="btn-toolbar" id="modal-huy">Huỷ</button>
                  <button class="btn-modal-ok" id="modal-ok">Xóa</button>
              </div>
          </div>
      </div>

      <script>
          const DEFAULT_CATEGORIES = ["Work", "Study", "Health", "Relax"];

          // Khởi tạo data — localStorage là cache, Firebase sẽ override khi connect
          let danhSachData = JSON.parse(localStorage.getItem("todos")) || [];
          let locHienTai    = "tat-ca";
          let tuKhoaTimKiem = "";

          // Đảm bảo DEFAULT_CATEGORIES luôn có trong danhMucList
          let _savedCats = JSON.parse(localStorage.getItem("categories"));
          let danhMucList = (_savedCats && _savedCats.length > 0) ? _savedCats : [...DEFAULT_CATEGORIES];
          // Merge: thêm category mặc định nếu user chưa có
          DEFAULT_CATEGORIES.forEach(function(cat) {
              if (!danhMucList.includes(cat)) danhMucList.unshift(cat);
          });

          // Expose lên window để Firebase module script truy cập được
          window.danhSachData = danhSachData;
          window.danhMucList  = danhMucList;


          function luuDanhMuc() {
              localStorage.setItem("categories", JSON.stringify(danhMucList));
              window.danhMucList = danhMucList;
              if (typeof window.syncToCloud === "function") window.syncToCloud();
          }

          // ============================================
          // QUẢN LÝ DANH MỤC
          // ============================================
          function veThanhLoc() {
              let boLoc = document.getElementById("bo-loc");
              boLoc.innerHTML = "";

              let tatCaBtn = document.createElement("button");
              tatCaBtn.className = "btn-loc" + (locHienTai === "tat-ca" ? " active" : "");
              tatCaBtn.textContent = "Tất cả";
              tatCaBtn.dataset.loc = "tat-ca";
              tatCaBtn.onclick = function() { locTheoNut("tat-ca", tatCaBtn); };
              boLoc.appendChild(tatCaBtn);

              danhMucList.forEach(function(ten) {
                  let btn = document.createElement("button");
                  btn.className = "btn-loc" + (locHienTai === ten ? " active" : "");
                  btn.textContent = ten;
                  btn.dataset.loc = ten;
                  btn.onclick = function() { locTheoNut(ten, btn); };
                  boLoc.appendChild(btn);
              });
          }

          function locTheoNut(gia_tri, nut) {
              locHienTai = gia_tri;
              document.querySelectorAll("#bo-loc .btn-loc").forEach(b => b.classList.remove("active"));
              nut.classList.add("active");
              veGiaoDien();
          }

          function capNhatSelectDanhMuc() {
              // Cập nhật select trong form thêm
              let sel = document.getElementById("input-danh-sach");
              let curVal = sel.value;
              sel.innerHTML = '<option value="">— Danh sách —</option>';
              danhMucList.forEach(function(ten) {
                  let opt = document.createElement("option");
                  opt.value = ten;
                  opt.textContent = ten;
                  sel.appendChild(opt);
              });
              sel.value = curVal;
          }

          function vePanelDanhMuc() {
              let ds = document.getElementById("panel-dm-ds");
              ds.innerHTML = "";
              if (danhMucList.length === 0) {
                  ds.innerHTML = '<div style="font-size:13px;color:var(--text-sub);font-style:italic;padding:4px 0;">Chưa có danh sách nào</div>';
                  return;
              }
              danhMucList.forEach(function(ten) {
                  let row = document.createElement("div");
                  row.className = "panel-dm-item";

                  let label = document.createElement("span");
                  label.className = "panel-dm-ten";
                  label.textContent = ten;

                  let btnXoa = document.createElement("button");
                  btnXoa.textContent = "✕";
                  btnXoa.onclick = function() { xoaDanhMuc(ten); };

                  row.appendChild(label);
                  row.appendChild(btnXoa);
                  ds.appendChild(row);
              });
          }

          function batTatPanelDanhMuc() {
              let panel = document.getElementById("panel-danh-muc");
              let dang = panel.style.display !== "none";
              panel.style.display = dang ? "none" : "block";
              if (!dang) {
                  vePanelDanhMuc();
                  document.getElementById("input-ten-dm").focus();
              }
          }

          function themDanhMuc() {
              let input = document.getElementById("input-ten-dm");
              let ten = input.value.trim();
              if (ten === "") return;
              if (danhMucList.includes(ten)) {
                  alert("Danh sách \"" + ten + "\" đã tồn tại!");
                  return;
              }
              danhMucList.push(ten);
              luuDanhMuc();
              input.value = "";
              capNhatSelectDanhMuc();
              veThanhLoc();
              vePanelDanhMuc();
          }

          function xoaDanhMuc(ten) {
              let soTask = danhSachData.filter(t => t.danhSach === ten).length;
              let msg = soTask > 0
                  ? 'Xóa danh sách "' + ten + '"? ' + soTask + ' task đang dùng sẽ bị bỏ phân loại.'
                  : 'Xóa danh sách "' + ten + '"?';
              hienModal(msg, "Xóa", function() {
                  // Bỏ phân loại các task đang dùng
                  danhSachData.forEach(function(t) {
                      if (t.danhSach === ten) t.danhSach = null;
                  });
                  luuDuLieu();
                  danhMucList = danhMucList.filter(d => d !== ten);
                  luuDanhMuc();
                  if (locHienTai === ten) locHienTai = "tat-ca";
                  capNhatSelectDanhMuc();
                  veThanhLoc();
                  vePanelDanhMuc();
                  veGiaoDien();
              });
          }

          // ============================================
          // MODAL XÁC NHẬN
          // ============================================
          function hienModal(message, labelOk, callback, chiDong) {
              let overlay = document.getElementById("modal-xac-nhan");
              document.getElementById("modal-msg").innerHTML = message.replace(/\n/g, "<br>");
              let btnOk  = document.getElementById("modal-ok");
              let btnHuy = document.getElementById("modal-huy");
              btnOk.textContent = labelOk || "Xóa";
              btnHuy.style.display = chiDong ? "none" : "";
              overlay.style.display = "flex";

              function dongModal() {
                  overlay.style.display = "none";
                  btnOk.onclick   = null;
                  btnHuy.onclick  = null;
                  overlay.onclick = null;
                  btnHuy.style.display = "";
              }

              btnOk.onclick  = function() { dongModal(); if (callback) callback(); };
              btnHuy.onclick = dongModal;
              overlay.onclick = function(e) { if (e.target === overlay) dongModal(); };
          }

          // ============================================
          // DARK MODE
          // ============================================
          function batTatDarkMode() {
              document.body.classList.toggle("dark");
              let isDark = document.body.classList.contains("dark");
              document.getElementById("btn-dark").textContent = isDark ? "☀️" : "🌙";
              localStorage.setItem("darkMode", isDark ? "on" : "off");
          }

          if (localStorage.getItem("darkMode") === "on") {
              document.body.classList.add("dark");
              document.getElementById("btn-dark").textContent = "☀️";
          }

          // ============================================
          // TABS
          // ============================================
          function chuyenTab(tabId, nut) {
              document.querySelectorAll(".man-hinh").forEach(m => m.classList.remove("active"));
              document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
              document.getElementById(tabId).classList.add("active");
              nut.classList.add("active");
              if (tabId === "lich-tab") {
                  veLich();
                  // Cập nhật số lượng lưu trữ trên tiêu đề
                  let soLT = danhSachData.filter(t => t.luuTru).length;
                  let el = document.getElementById("luu-tru-title");
                  if (el) el.textContent = "📦 Lưu trữ" + (soLT > 0 ? " (" + soLT + ")" : "");
                  if (luuTruMoDang) veLuuTru();
              }
          }

          // ============================================
          // LỌC + TÌM KIẾM
          // ============================================
          function locTheo(gia_tri, nut) {
              locHienTai = gia_tri;
              document.querySelectorAll(".btn-loc").forEach(b => b.classList.remove("active"));
              nut.classList.add("active");
              veGiaoDien();
          }

          function timKiem() {
              tuKhoaTimKiem = document.getElementById("input-tim-kiem").value.trim().toLowerCase();
              veGiaoDien();
          }

          function layDanhSachDaLoc() {
              let ketQua = danhSachData.filter(t => !t.luuTru);
              if (locHienTai !== "tat-ca") {
                  ketQua = ketQua.filter(task => task.danhSach === locHienTai);
              }
              if (tuKhoaTimKiem !== "") {
                  ketQua = ketQua.filter(task =>
                      task.tenCongViec.toLowerCase().includes(tuKhoaTimKiem)
                  );
              }
              return ketQua;
          }

          function highlight(text) {
              if (!tuKhoaTimKiem) return text;
              let regex = new RegExp("(" + tuKhoaTimKiem.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ")", "gi");
              return text.replace(regex, '<mark class="highlight">$1</mark>');
          }

          // ============================================
          // SẮP XẾP
          // ============================================
          function layDanhSachDaSapXep(ds) {
              let kieu = document.getElementById("chon-sap-xep").value;
              let ban  = [...ds];
              if (kieu === "deadline") {
                  return ban.sort(function(a, b) {
                      if (!a.deadline) return 1;
                      if (!b.deadline) return -1;
                      return a.deadline.localeCompare(b.deadline);
                  });
              }
              if (kieu === "ten-az") return ban.sort((a, b) => a.tenCongViec.localeCompare(b.tenCongViec, "vi"));
              if (kieu === "ten-za") return ban.sort((a, b) => b.tenCongViec.localeCompare(a.tenCongViec, "vi"));
              return ban;
          }

          // ============================================
          // ĐẾM TASK TRÊN THANH LỌC
          // ============================================
          function capNhatSoLuongLoc() {
              let boLoc = document.getElementById("bo-loc");
              if (!boLoc) return;
              boLoc.querySelectorAll(".btn-loc").forEach(function(nut) {
                  let val = nut.dataset.loc;
                  if (!val) return;
                  let label = val === "tat-ca" ? "Tất cả" : val;
                  let so    = val === "tat-ca"
                      ? danhSachData.filter(t => !t.luuTru).length
                      : danhSachData.filter(t => !t.luuTru && t.danhSach === val).length;
                  nut.textContent = so > 0 ? label + " (" + so + ")" : label;
              });
          }

          // ============================================
          // VẼ GIAO DIỆN
          // ============================================
          function veGiaoDien() {
              let container = document.getElementById("danh-sach");
              container.innerHTML = "";

              capNhatSoLuongLoc();

              let daDuocLoc = layDanhSachDaSapXep(layDanhSachDaLoc());

              if (daDuocLoc.length === 0) {
                  capNhatDem();
                  hienEmptyState();
                  return;
              }

              let coDeadline    = daDuocLoc.filter(t => t.deadline);
              let khongDeadline = daDuocLoc.filter(t => !t.deadline);

              let nhomTheoNgay = {};
              coDeadline.forEach(function(task) {
                  let ngay = task.deadline.split("T")[0];
                  if (!nhomTheoNgay[ngay]) nhomTheoNgay[ngay] = [];
                  nhomTheoNgay[ngay].push(task);
              });

              Object.keys(nhomTheoNgay).sort().forEach(function(ngay) {
                  let nhom   = document.createElement("div");
                  nhom.className = "nhom-ngay";

                  let tieuDe = document.createElement("div");
                  tieuDe.className = "tieu-de-ngay";

                  let homNay = layNgayHomNay();
                  if (ngay < homNay) {
                      tieuDe.classList.add("qua-han");
                      tieuDe.textContent = "Quá hạn — " + dinhDangNgay(ngay);
                  } else if (ngay === homNay) {
                      tieuDe.classList.add("hom-nay");
                      tieuDe.textContent = "Hôm nay — " + dinhDangNgay(ngay);
                  } else {
                      tieuDe.textContent = dinhDangNgay(ngay);
                  }

                  nhom.appendChild(tieuDe);
                  let ul = document.createElement("ul");
                  nhomTheoNgay[ngay].forEach(function(task) {
                      ul.appendChild(taoLiElement(task, danhSachData.indexOf(task)));
                  });
                  nhom.appendChild(ul);
                  container.appendChild(nhom);
              });

              if (khongDeadline.length > 0) {
                  let nhom   = document.createElement("div");
                  nhom.className = "nhom-ngay";
                  let tieuDe = document.createElement("div");
                  tieuDe.className = "tieu-de-ngay";
                  tieuDe.textContent = "Chưa đặt deadline";
                  nhom.appendChild(tieuDe);
                  let ul = document.createElement("ul");
                  khongDeadline.forEach(function(task) {
                      ul.appendChild(taoLiElement(task, danhSachData.indexOf(task)));
                  });
                  nhom.appendChild(ul);
                  container.appendChild(nhom);
              }

              capNhatDem();
          }

          // ============================================
          // TẠO 1 DÒNG TASK
          // ============================================
          function taoLiElement(item, index) {
              let li     = document.createElement("li");
              let homNay = layNgayHomNay();

              if (item.deadline && item.deadline.split("T")[0] < homNay && !item.hoànThành) {
                  li.classList.add("qua-han");
              }

              let noiDung = document.createElement("div");
              noiDung.className = "noi-dung-task";
              if (item.hoànThành) noiDung.classList.add("hoan-thanh");

              let tenSpan = document.createElement("span");
              tenSpan.className = "ten-cong-viec";
              tenSpan.innerHTML = highlight(item.tenCongViec);
              noiDung.appendChild(tenSpan);

              if (item.deadline) {
                  let gioSpan = document.createElement("span");
                  gioSpan.className = "gio-deadline";
                  if (item.deadline.split("T")[0] < homNay && !item.hoànThành) {
                      gioSpan.classList.add("qua-han");
                  }
                  gioSpan.textContent = dinhDangGio(item.deadline);
                  noiDung.appendChild(gioSpan);

                  if (!item.hoànThành) {
                      let demNguoc = tinhDemNguoc(item.deadline);
                      if (demNguoc) {
                          let demSpan = document.createElement("span");
                          demSpan.className = "dem-nguoc " + demNguoc.loai;
                          demSpan.textContent = demNguoc.text;
                          noiDung.appendChild(demSpan);
                      }
                  }
              }

              if (item.danhSach) {
                  let badge = document.createElement("span");
                  badge.className = "badge-ds";
                  badge.textContent = item.danhSach;
                  noiDung.appendChild(badge);
              }

              noiDung.onclick = function() {
                  let idx = danhSachData.findIndex(t => t.id === item.id);
                  if (idx === -1) return;
                  danhSachData[idx].hoànThành = !danhSachData[idx].hoànThành;
                  luuDuLieu();
                  veGiaoDien();
              };

              let nhomNut = document.createElement("div");
              nhomNut.className = "nhom-nut";

              let nutSua = document.createElement("button");
              nutSua.textContent = "✎";
              nutSua.title = "Sửa";
              nutSua.onclick = function() { batDauSua(li, item.id, noiDung); };

              let nutXoa = document.createElement("button");
              nutXoa.textContent = "✕";
              nutXoa.title = "Xóa";
              nutXoa.onclick = function() {
                  hienModal('Xóa task "' + item.tenCongViec + '"?', "Xóa", function() {
                      li.classList.add("dang-xoa");
                      setTimeout(function() {
                          let idx = danhSachData.findIndex(t => t.id === item.id);
                          if (idx !== -1) danhSachData.splice(idx, 1);
                          luuDuLieu();
                          veGiaoDien();
                      }, 200);
                  });
              };

              nhomNut.appendChild(nutSua);
              nhomNut.appendChild(nutXoa);
              li.appendChild(noiDung);
              li.appendChild(nhomNut);

              ganSuKienKeoTha(li, index);
              if (item.laMoi) {
                  li.classList.add("them-moi");
                  // Xóa flag sau khi animation chạy xong
                  delete danhSachData[index].laMoi;
                  luuDuLieu();
              }
              return li;
          }

          // ============================================
          // SỬA TASK
          // ============================================
          function batDauSua(li, taskId, noiDung) {
              let index = danhSachData.findIndex(t => t.id === taskId);
              if (index === -1) return;
              noiDung.style.display = "none";

              let khoi = document.createElement("div");
              khoi.style.flex = "1";
              khoi.style.display = "flex";
              khoi.style.flexDirection = "column";
              khoi.style.gap = "6px";

              let inputSua = document.createElement("input");
              inputSua.type = "text";
              inputSua.className = "input-sua";
              inputSua.value = danhSachData[index].tenCongViec;

              let inputDeadlineSua = document.createElement("input");
              inputDeadlineSua.type = "datetime-local";
              inputDeadlineSua.className = "input-sua";
              inputDeadlineSua.value = danhSachData[index].deadline || "";

              let selectSua = document.createElement("select");
              selectSua.className = "input-sua";
              selectSua.innerHTML = '<option value="">— Danh sách —</option>';
              danhMucList.forEach(function(ten) {
                  let opt = document.createElement("option");
                  opt.value = ten;
                  opt.textContent = ten;
                  selectSua.appendChild(opt);
              });
              selectSua.value = danhSachData[index].danhSach || "";

              khoi.appendChild(inputSua);
              khoi.appendChild(inputDeadlineSua);
              khoi.appendChild(selectSua);

              let nutLuu = document.createElement("button");
              nutLuu.textContent = "✓";
              nutLuu.title = "Lưu";

              function luuSua() {
                  let noiDungMoi = inputSua.value.trim();
                  if (noiDungMoi === "") {
                      alert("Tên công việc không được để trống!");
                      return;
                  }
                  let idx = danhSachData.findIndex(t => t.id === taskId);
                  if (idx === -1) return;
                  danhSachData[idx].tenCongViec = noiDungMoi;
                  danhSachData[idx].deadline    = inputDeadlineSua.value || null;
                  danhSachData[idx].danhSach    = selectSua.value || null;
                  luuDuLieu();
                  veGiaoDien();
              }

              nutLuu.onclick = luuSua;
              inputSua.onkeydown = function(e) {
                  if (e.key === "Enter")  luuSua();
                  if (e.key === "Escape") veGiaoDien();
              };

              li.insertBefore(khoi, li.lastChild);
              let nhomNut = li.lastChild;
              nhomNut.insertBefore(nutLuu, nhomNut.firstChild);
              nhomNut.children[1].style.display = "none";

              inputSua.focus();
              inputSua.setSelectionRange(inputSua.value.length, inputSua.value.length);
          }

          // ============================================
          // KÉO THẢ
          // ============================================
          let idDangKeo = null;

          function ganSuKienKeoTha(li, index) {
              let idTask = danhSachData[index].id;

              li.draggable = true;
              li.dataset.id = idTask;

              li.ondragstart = function() {
                  idDangKeo = idTask;
                  setTimeout(() => li.classList.add("dang-keo"), 0);
              };

              li.ondragover = function(e) {
                  e.preventDefault();
                  document.querySelectorAll("li").forEach(el => el.classList.remove("vi-tri-tha"));
                  li.classList.add("vi-tri-tha");
              };

              li.ondrop = function(e) {
                  e.preventDefault();
                  if (!idDangKeo || idDangKeo === idTask) return;

                  // Tìm index thật trong mảng gốc theo id
                  let indexKeo = danhSachData.findIndex(t => t.id === idDangKeo);
                  let indexTha = danhSachData.findIndex(t => t.id === idTask);

                  if (indexKeo === -1 || indexTha === -1) return;

                  let taskKeo = danhSachData.splice(indexKeo, 1)[0];
                  danhSachData.splice(indexTha, 0, taskKeo);

                  luuDuLieu();
                  veGiaoDien();
              };

              li.ondragend = function() {
                  idDangKeo = null;
                  document.querySelectorAll("li").forEach(el => {
                      el.classList.remove("dang-keo");
                      el.classList.remove("vi-tri-tha");
                  });
              };
          }

          // ============================================
          // XÓA HÀNG LOẠT
          // ============================================
          function xoaTatCaHoanThanh() {
              let so = danhSachData.filter(t => t.hoànThành).length;
              if (so === 0) { alert("Không có task nào đã hoàn thành!"); return; }
              hienModal("Xóa " + so + " task đã hoàn thành?", "Xóa", function() {
                  danhSachData = danhSachData.filter(t => !t.hoànThành);
                  luuDuLieu();
                  veGiaoDien();
              });
          }

          function xoaTatCa() {
              if (danhSachData.length === 0) { alert("Không có task nào!"); return; }
              hienModal("Xóa toàn bộ " + danhSachData.length + " task? Không thể hoàn tác!", "Xóa tất cả", function() {
                  danhSachData = [];
                  luuDuLieu();
                  veGiaoDien();
              });
          }

          // ============================================
          // EMPTY STATE
          // ============================================
          const emptyMessages = [
              { icon: "☕", title: "Chưa có việc gì cả!", sub: "Pha tách cà phê rồi bắt đầu thôi..." },
              { icon: "✨", title: "Trang giấy trắng!", sub: "Mọi kế hoạch lớn đều bắt đầu từ đây." },
              { icon: "🌿", title: "Thảnh thơi quá!", sub: "Thêm task đầu tiên của ngày nào." },
              { icon: "📖", title: "Hôm nay chưa có gì!", sub: "Viết xuống để không quên nhé." }
          ];

          function hienEmptyState() {
              let container = document.getElementById("danh-sach");
              let msg = emptyMessages[Math.floor(Math.random() * emptyMessages.length)];
              container.innerHTML = `
                  <div class="empty-state">
                      <div class="empty-icon">${msg.icon}</div>
                      <div class="empty-title">${msg.title}</div>
                      <div class="empty-sub">${msg.sub}</div>
                  </div>
              `;
          }

          // ============================================
          // PROGRESS BAR + ĐẾM
          // ============================================
          function capNhatDem() {
              let daDuocLoc = layDanhSachDaLoc();
              let tatCa     = daDuocLoc.length;
              let hoànThành = daDuocLoc.filter(item => item.hoànThành).length;
              let chuaXong  = tatCa - hoànThành;
              let phanTram  = tatCa === 0 ? 0 : Math.round((hoànThành / tatCa) * 100);

              let progressWrap = document.getElementById("progress-wrap");
              let dem          = document.getElementById("dem");
              let bar          = document.getElementById("progress-bar");
              let phanTramEl   = document.getElementById("dem-phan-tram");

              if (tatCa === 0) {
                  progressWrap.style.display = "none";
              } else {
                  progressWrap.style.display = "block";
                  dem.textContent = chuaXong === 0
                      ? "Hoàn thành tất cả " + tatCa + " task! 🎉"
                      : hoànThành + "/" + tatCa + " task hoàn thành";
                  phanTramEl.textContent = phanTram + "%";
                  bar.style.width = phanTram + "%";
                  phanTram === 100
                      ? bar.classList.add("full")
                      : bar.classList.remove("full");
              }
          }

          // ============================================
          // ĐẾM NGƯỢC DEADLINE
          // ============================================
          function tinhDemNguoc(deadline) {
              let bayGio    = new Date();
              let hetHan    = new Date(deadline);
              let conLaiMs  = hetHan - bayGio;
              if (conLaiMs < 0) return null;

              let conLaiPhut = Math.floor(conLaiMs / 1000 / 60);
              let conLaiGio  = Math.floor(conLaiPhut / 60);
              let conLaiNgay = Math.floor(conLaiGio / 24);

              if (conLaiPhut < 60) {
                  return { text: "còn " + conLaiPhut + " phút", loai: "gap" };
              } else if (conLaiGio < 24) {
                  let phutDu = conLaiPhut % 60;
                  let chuoi  = "còn " + conLaiGio + " giờ";
                  if (phutDu > 0) chuoi += " " + phutDu + " phút";
                  return { text: chuoi, loai: "hom-nay" };
              } else if (conLaiNgay <= 3) {
                  return { text: "còn " + conLaiNgay + " ngày", loai: "binh-thuong" };
              }
              return null;
          }

          // ============================================
          // LỊCH
          // ============================================
          let thangHienTai = new Date().getMonth();
          let namHienTai   = new Date().getFullYear();
          let ngayDangChon = null;

          function doiThang(delta) {
              thangHienTai += delta;
              if (thangHienTai > 11) { thangHienTai = 0; namHienTai++; }
              if (thangHienTai < 0)  { thangHienTai = 11; namHienTai--; }
              veLich();
          }

          function veHomNay() {
              thangHienTai = new Date().getMonth();
              namHienTai   = new Date().getFullYear();
              ngayDangChon = layNgayHomNay();
              veLich();
              hienTaskCuaNgay(ngayDangChon);
          }

          function veLich() {
              let grid   = document.getElementById("lich-grid");
              let tieuDe = document.getElementById("tieu-de-thang");
              grid.innerHTML = "";

              let tenThang = ["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6",
                              "Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"];
              tieuDe.textContent = tenThang[thangHienTai] + " " + namHienTai;

              ["CN","T2","T3","T4","T5","T6","T7"].forEach(function(thu) {
                  let o = document.createElement("div");
                  o.className = "lich-thu";
                  o.textContent = thu;
                  grid.appendChild(o);
              });

              let ngayDauThang     = new Date(namHienTai, thangHienTai, 1).getDay();
              let soNgayTrongThang = new Date(namHienTai, thangHienTai + 1, 0).getDate();
              let soNgayThangTruoc = new Date(namHienTai, thangHienTai, 0).getDate();
              let homNayStr        = layNgayHomNay();

              let taskTheoNgay = {};
              danhSachData.forEach(function(task) {
                  if (!task.deadline) return;
                  let ngay = task.deadline.split("T")[0];
                  if (!taskTheoNgay[ngay]) taskTheoNgay[ngay] = [];
                  taskTheoNgay[ngay].push(task);
              });

              for (let i = 0; i < ngayDauThang; i++) {
                  let so = soNgayThangTruoc - ngayDauThang + 1 + i;
                  let o  = document.createElement("div");
                  o.className = "lich-o thang-khac";
                  o.innerHTML = `<span class="lich-so">${so}</span>`;
                  grid.appendChild(o);
              }

              for (let ngay = 1; ngay <= soNgayTrongThang; ngay++) {
                  let thangStr = String(thangHienTai + 1).padStart(2, "0");
                  let ngayStr  = String(ngay).padStart(2, "0");
                  let ngayDay  = namHienTai + "-" + thangStr + "-" + ngayStr;

                  let o = document.createElement("div");
                  o.className = "lich-o";
                  if (ngayDay === homNayStr)    o.classList.add("hom-nay");
                  if (ngayDay === ngayDangChon) o.classList.add("dang-chon");

                  let soEl = document.createElement("span");
                  soEl.className = "lich-so";
                  soEl.textContent = ngay;
                  o.appendChild(soEl);

                  if (taskTheoNgay[ngayDay]) {
                      let chamRow = document.createElement("div");
                      chamRow.className = "lich-cham";
                      let soTask = Math.min(taskTheoNgay[ngayDay].length, 3);
                      for (let c = 0; c < soTask; c++) {
                          let cham = document.createElement("div");
                          cham.className = "cham";
                          chamRow.appendChild(cham);
                      }
                      o.appendChild(chamRow);
                  }

                  o.onclick = function() {
                      ngayDangChon = ngayDay;
                      veLich();
                      hienTaskCuaNgay(ngayDay);
                  };

                  grid.appendChild(o);
              }

              let tongO   = ngayDauThang + soNgayTrongThang;
              let oConLai = tongO % 7 === 0 ? 0 : 7 - (tongO % 7);
              for (let i = 1; i <= oConLai; i++) {
                  let o = document.createElement("div");
                  o.className = "lich-o thang-khac";
                  o.innerHTML = `<span class="lich-so">${i}</span>`;
                  grid.appendChild(o);
              }

              if (ngayDangChon) hienTaskCuaNgay(ngayDangChon);
          }

          function hienTaskCuaNgay(ngayDay) {
              let panel = document.getElementById("lich-panel");
              panel.innerHTML = "";

              let [nam, thang, ngay] = ngayDay.split("-");

              let taskHom = danhSachData.filter(function(task) {
                  return task.deadline && task.deadline.split("T")[0] === ngayDay;
              });

              // Header: tiêu đề + nút xóa tất cả
              let header = document.createElement("div");
              header.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;";

              let tieuDe = document.createElement("div");
              tieuDe.className = "lich-panel-tieu-de";
              tieuDe.style.marginBottom = "0";
              tieuDe.textContent = "Ngày " + ngay + "/" + thang;
              header.appendChild(tieuDe);

              if (taskHom.length > 0) {
                  let btnXoaTatCa = document.createElement("button");
                  btnXoaTatCa.className = "btn-toolbar nguy-hiem";
                  btnXoaTatCa.style.fontSize = "12px";
                  btnXoaTatCa.textContent = "✕ Xóa tất cả";
                  btnXoaTatCa.onclick = function() {
                      hienModal("Xóa toàn bộ " + taskHom.length + " task ngày " + ngay + "/" + thang + "?", "Xóa tất cả", function() {
                          let ids = taskHom.map(t => t.id);
                          danhSachData = danhSachData.filter(t => !ids.includes(t.id));
                          luuDuLieu();
                          veLich();
                      });
                  };
                  header.appendChild(btnXoaTatCa);
              }

              panel.appendChild(header);

              if (taskHom.length === 0) {
                  let trong = document.createElement("div");
                  trong.className = "lich-trong";
                  trong.textContent = "Không có task nào";
                  panel.appendChild(trong);
                  return;
              }

              taskHom.sort((a, b) => a.deadline.localeCompare(b.deadline));

              taskHom.forEach(function(task) {
                  let item = document.createElement("div");
                  item.className = "lich-task-item";
                  if (task.hoànThành) item.classList.add("da-xong");

                  let gio = document.createElement("span");
                  gio.className = "lich-task-gio";
                  gio.textContent = dinhDangGio(task.deadline);

                  let ten = document.createElement("span");
                  ten.className = "lich-task-ten";
                  ten.textContent = task.tenCongViec;

                  // Click vào tên/giờ để toggle hoàn thành
                  let clickArea = document.createElement("div");
                  clickArea.style.cssText = "display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;";
                  clickArea.appendChild(gio);
                  clickArea.appendChild(ten);
                  clickArea.onclick = function() {
                      let index = danhSachData.indexOf(task);
                      danhSachData[index].hoànThành = !danhSachData[index].hoànThành;
                      luuDuLieu();
                      veLich();
                  };

                  item.appendChild(clickArea);

                  if (task.danhSach) {
                      let ds = document.createElement("span");
                      ds.className = "lich-task-ds";
                      ds.textContent = task.danhSach;
                      item.appendChild(ds);
                  }

                  // Nút xóa từng task
                  let btnXoa = document.createElement("button");
                  btnXoa.className = "lich-task-xoa";
                  btnXoa.textContent = "✕";
                  btnXoa.title = "Xóa";
                  btnXoa.onclick = function(e) {
                      e.stopPropagation();
                      hienModal('Xóa task "' + task.tenCongViec + '"?', "Xóa", function() {
                          let idx = danhSachData.findIndex(t => t.id === task.id);
                          if (idx !== -1) danhSachData.splice(idx, 1);
                          luuDuLieu();
                          veLich();
                      });
                  };
                  item.appendChild(btnXoa);

                  panel.appendChild(item);
              });
          }

          // ============================================
          // NHẮC DEADLINE TRƯỚC 15 PHÚT
          // ============================================
          if ("Notification" in window && Notification.permission === "default") {
              Notification.requestPermission();
          }

          let daNhac = JSON.parse(localStorage.getItem("daNhac")) || {};

          function kiemTraDeadline() {
              if (Notification.permission !== "granted") return;
              let bayGio = new Date();
              danhSachData.forEach(function(task) {
                  if (!task.deadline || task.hoànThành) return;
                  let hetHan  = new Date(task.deadline);
                  let conLai  = (hetHan - bayGio) / 1000 / 60;
                  let key     = task.deadline + task.tenCongViec;
                  if (conLai > 0 && conLai <= 15 && !daNhac[key]) {
                      new Notification("⏰ Sắp đến hạn!", {
                          body: "\"" + task.tenCongViec + "\" còn 15 phút nữa!"
                      });
                      daNhac[key] = true;
                      localStorage.setItem("daNhac", JSON.stringify(daNhac));
                  }
              });
          }

          setInterval(kiemTraDeadline, 60 * 1000);
          kiemTraDeadline();

          // ============================================
          // LƯU TRỮ TẤT CẢ
          // ============================================
          function capNhatGioLuuTru() {
              let el = document.getElementById("luu-tru-footer-gio");
              if (!el) return;
              let now = new Date();
              let h = String(now.getHours()).padStart(2, "0");
              let m = String(now.getMinutes()).padStart(2, "0");
              let d = String(now.getDate()).padStart(2, "0");
              let mo = String(now.getMonth() + 1).padStart(2, "0");
              el.textContent = d + "/" + mo + " " + h + ":" + m;
          }
          capNhatGioLuuTru();
          setInterval(capNhatGioLuuTru, 60000);

          function luuTruTatCa() {
              let chuaLuu = danhSachData.filter(t => !t.luuTru);
              if (chuaLuu.length === 0) {
                  hienModal("Không có task nào để lưu trữ!", "Đóng", function() {}, true);
                  return;
              }
              let hom = new Date().toISOString().split("T")[0];
              hienModal("Lưu trữ toàn bộ " + chuaLuu.length + " task hôm nay?\nDanh sách sẽ được xóa sạch để bắt đầu ngày mới.", "Lưu trữ", function() {
                  danhSachData.forEach(function(t) {
                      if (!t.luuTru) {
                          t.luuTru = true;
                          t.ngayLuuTru = hom;
                      }
                  });
                  luuDuLieu();
                  veGiaoDien();
                  if (luuTruMoDang) veLuuTru();
              });
          }

          // ============================================
          // LƯU TRỮ
